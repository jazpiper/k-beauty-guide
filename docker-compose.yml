services:
  app:
    build:
      context: .
    command: npm start -- --host 0.0.0.0
    environment:
      CI: "true"
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      WDS_SOCKET_PORT: "0"
      REACT_APP_SUPABASE_URL: ${REACT_APP_SUPABASE_URL:-}
      REACT_APP_SUPABASE_ANON_KEY: ${REACT_APP_SUPABASE_ANON_KEY:-}
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
